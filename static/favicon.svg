<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Kvadstat">
  <defs>
    <linearGradient id="nxBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#nxBg)"/>
  <!-- skyline: ascending bars = новостройки + растущие цены/объёмы -->
  <g fill="#ffffff">
    <rect x="13" y="36" width="8" height="16" rx="2"/>
    <rect x="28" y="28" width="8" height="24" rx="2"/>
    <rect x="43" y="20" width="8" height="32" rx="2"/>
  </g>
  <!-- spark: динамика цены, идёт вверх слева направо -->
  <path d="M14 33 L29 25 L44 17" fill="none" stroke="#fbbf24"
        stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="44" cy="17" r="3.4" fill="#fbbf24"/>
</svg>
