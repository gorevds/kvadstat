<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Kvadstat — цены на новостройки Москвы">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- logo tile -->
  <g transform="translate(96,150)">
    <rect width="120" height="120" rx="26" fill="url(#tile)"/>
    <g fill="#ffffff" transform="translate(0,0)">
      <rect x="24" y="68" width="15" height="30" rx="4"/>
      <rect x="52" y="52" width="15" height="46" rx="4"/>
      <rect x="80" y="36" width="15" height="62" rx="4"/>
    </g>
    <path d="M26 62 L54 47 L83 31" fill="none" stroke="#fbbf24"
          stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="83" cy="31" r="6.5" fill="#fbbf24"/>
  </g>
  <!-- wordmark + tagline -->
  <text x="248" y="212" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="104" font-weight="800" fill="#ffffff" letter-spacing="-2">kvadstat</text>
  <text x="98" y="356" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="54" font-weight="700" fill="#e2e8f0">Цены на новостройки Москвы</text>
  <text x="98" y="424" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="36" font-weight="400" fill="#94a3b8">Динамика цен · реальные скидки · скорость продаж</text>
  <!-- developer chips -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="600">
    <g transform="translate(98,486)">
      <rect width="120" height="50" rx="25" fill="#1d283a" stroke="#334155"/>
      <text x="60" y="33" text-anchor="middle" fill="#cbd5e1">ПИК</text>
    </g>
    <g transform="translate(232,486)">
      <rect width="120" height="50" rx="25" fill="#1d283a" stroke="#334155"/>
      <text x="60" y="33" text-anchor="middle" fill="#cbd5e1">А101</text>
    </g>
    <g transform="translate(366,486)">
      <rect width="140" height="50" rx="25" fill="#1d283a" stroke="#334155"/>
      <text x="70" y="33" text-anchor="middle" fill="#cbd5e1">Донстрой</text>
    </g>
    <g transform="translate(520,486)">
      <rect width="120" height="50" rx="25" fill="#1d283a" stroke="#334155"/>
      <text x="60" y="33" text-anchor="middle" fill="#cbd5e1">Level</text>
    </g>
    <g transform="translate(654,486)">
      <rect width="180" height="50" rx="25" fill="#1d283a" stroke="#334155"/>
      <text x="90" y="33" text-anchor="middle" fill="#cbd5e1">+ ещё 6</text>
    </g>
  </g>
  <text x="1102" y="586" text-anchor="end" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="28" font-weight="500" fill="#64748b">kvadstat.gorev.space</text>
</svg>
